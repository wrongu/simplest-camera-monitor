name: "Camera Monitor"
description: "ONVIF camera motion detection and object classification"
version: "1.0.5"
slug: "camera_monitor"
init: false
homeassistant_api: true
host_network: true
arch:
  - aarch64
  - amd64
map:
  - addon_config:ro # read /config/config.yaml (mapped from /addon_configs/local_camera_monitor/config.yaml)
  - media:rw # camera image logs (output_dir)
privileged:
  - SYS_TIME # for accurate timestamping of camera images
stage: experimental